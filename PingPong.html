<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Cup: Orange Tie Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05050a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Orbitron, sans-serif;
            overflow: hidden;
            color: white;
        }

        #menu-bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: 0;
            display: block;
        }

        #menu-bg-fallback {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            background: radial-gradient(ellipse at 30% 50%, #0a1a0a 0%, #05050a 60%, #000 100%);
        }

        #game-ui {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #05050a;
        }

        #timer-display {
            background: #000;
            color: #00ff00;
            padding: 10px 25px;
            border: 2px solid #00ff00;
            font-size: 32px;
            font-weight: bold;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            min-width: 140px;
            margin-bottom: 10px;
            display: inline-block;
            text-align: center;
        }

        #difficulty-badge {
            display: inline-block;
            margin-left: 15px;
            padding: 6px 18px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            vertical-align: middle;
            border: 2px solid;
            text-transform: uppercase;
        }

        canvas {
            border: 4px solid #fff;
            background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            display: block;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding: 12px 0 0;
            font-size: 26px;
            font-weight: bold;
        }

        .winning { color: #00ff00 !important; text-shadow: 0 0 20px #00ff00; transform: scale(1.1); transition: 0.3s; }
        .losing  { color: #ff0000 !important; text-shadow: 0 0 20px #ff0000; transform: scale(0.9); transition: 0.3s; }
        .tie     { color: #ff8c00 !important; text-shadow: 0 0 20px #ff8c00; transition: 0.3s; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.55);
        }

        .overlay-content {
            text-align: center;
            border: 3px solid #00ff00;
            padding: 50px;
            border-radius: 20px;
            background: rgba(10, 10, 10, 0.65);
            box-shadow: 0 0 30px #00ff00;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .btn {
            background: #00ff00; color: black; border: none; padding: 15px 40px;
            font-weight: bold; cursor: pointer; font-size: 20px; margin-top: 20px;
            transition: 0.3s; border-radius: 5px;
        }
        .btn:hover { transform: scale(1.1); background: #00cc00; }
        .hidden { display: none !important; }

        .mode-title { font-size: 13px; letter-spacing: 3px; color: #aaa; text-transform: uppercase; margin: 24px 0 12px; }
        .mode-grid  { display: flex; gap: 16px; justify-content: center; margin-bottom: 6px; }

        .mode-btn {
            position: relative; width: 160px; padding: 20px 10px 16px;
            border-radius: 10px; border: 2px solid #00ff00; cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
            background: rgba(0,0,0,0.5); display: flex; flex-direction: column;
            align-items: center; gap: 7px; color: #00ff00;
        }
        .mode-btn:hover { transform: translateY(-4px); }
        .mode-btn.selected { background: rgba(0,255,0,0.10); box-shadow: 0 0 22px #00ff0088; }
        .mode-btn .mode-icon { font-size: 32px; }
        .mode-btn .mode-name { font-size: 14px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; }
        .mode-btn .mode-desc { font-size: 10px; opacity: 0.7; line-height: 1.4; }
        .mode-btn .check { position: absolute; top: 6px; right: 8px; font-size: 13px; display: none; }
        .mode-btn.selected .check { display: block; }

        #controls-info { margin: 10px 0 0; font-size: 11px; color: #888; letter-spacing: 1px; line-height: 1.8; }

        .difficulty-title { font-size: 13px; letter-spacing: 3px; color: #aaa; text-transform: uppercase; margin: 22px 0 12px; }
        .diff-grid { display: flex; gap: 14px; justify-content: center; margin-bottom: 10px; }

        .diff-btn {
            position: relative; width: 120px; padding: 16px 8px 12px;
            border-radius: 10px; border: 2px solid; cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
            background: rgba(0,0,0,0.5); display: flex; flex-direction: column;
            align-items: center; gap: 6px;
        }
        .diff-btn:hover { transform: translateY(-4px); }
        .diff-btn.selected { background: rgba(255,255,255,0.12); }
        .diff-btn .diff-icon { font-size: 26px; }
        .diff-btn .diff-name { font-size: 12px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; }
        .diff-btn .diff-desc { font-size: 10px; opacity: 0.75; line-height: 1.4; }
        .diff-btn .check { position: absolute; top: 6px; right: 8px; font-size: 13px; display: none; }
        .diff-btn.selected .check { display: block; }

        .diff-btn[data-diff="rookie"]          { border-color: #4ec94e; color: #4ec94e; }
        .diff-btn[data-diff="rookie"].selected  { box-shadow: 0 0 18px #4ec94e88; }
        .diff-btn[data-diff="hacker"]          { border-color: #f0c040; color: #f0c040; }
        .diff-btn[data-diff="hacker"].selected  { box-shadow: 0 0 18px #f0c04088; }
        .diff-btn[data-diff="elite"]           { border-color: #ff4444; color: #ff4444; }
        .diff-btn[data-diff="elite"].selected   { box-shadow: 0 0 18px #ff444488; }
        .diff-btn[data-diff="god"]             { border-color: #cc44ff; color: #cc44ff; }
        .diff-btn[data-diff="god"].selected     { box-shadow: 0 0 28px #cc44ff99; }

        @keyframes godPulse {
            0%,100% { box-shadow: 0 0 18px #cc44ffaa; }
            50%      { box-shadow: 0 0 40px #cc44ff, 0 0 80px #ff44ccaa; }
        }
        .diff-btn[data-diff="god"].selected { animation: godPulse 1.4s infinite; }
        #diff-section.hidden { display: none !important; }

        #tap-to-play {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 20; background: rgba(0,255,0,0.15); border: 1px solid #00ff0066;
            color: #00ff00; padding: 8px 20px; border-radius: 20px;
            font-size: 12px; letter-spacing: 2px; cursor: pointer; display: none;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="menu-bg-fallback"></div>
    <video id="menu-bg-video" autoplay muted loop playsinline preload="auto">
        <source src="Hacker.mp4" type="video/mp4">
    </video>
    <button id="tap-to-play" onclick="unlockVideo()">▶ TOCA PARA ACTIVAR VÍDEO</button>

    <img id="balon" src="Balon.png" style="display:none;">
    <img id="iaImg" src="nino.png" style="display:none;">
    <img id="botImg" src="bot.png" style="display:none;">
    <video id="fondo" style="display:none;" autoplay muted loop playsinline>
        <source src="grass.mp4" type="video/mp4">
    </video>

    <div id="menu" class="overlay">
        <div class="overlay-content">
            <h1 style="font-size: 50px; margin-bottom: 6px;">HACKER CUP</h1>
            <p style="color: #00ff00; letter-spacing: 2px;">90 SEG | 10 GOLES | EMPATE NARANJA</p>

            <p class="mode-title">Modo de juego</p>
            <div class="mode-grid">
                <button class="mode-btn selected" data-mode="1p" onclick="selectMode('1p')">
                    <span class="check">✔</span>
                    <span class="mode-icon">🤖</span>
                    <span class="mode-name">1 Jugador</span>
                    <span class="mode-desc">Tú vs IA<br>Hacker Bot</span>
                </button>
                <button class="mode-btn" data-mode="2p" onclick="selectMode('2p')">
                    <span class="check">✔</span>
                    <span class="mode-icon">👥</span>
                    <span class="mode-name">2 Jugadores</span>
                    <span class="mode-desc">Local con<br>un colega</span>
                </button>
            </div>

            <div id="controls-info">
                <span id="ctrl-1p">🎮 W/S o ↑/↓ para mover</span>
                <span id="ctrl-2p" style="display:none;">🟦 J1: W / S &nbsp;&nbsp;|&nbsp;&nbsp; 🟥 J2: ↑ / ↓</span>
            </div>

            <div id="diff-section">
                <p class="difficulty-title">Dificultad</p>
                <div class="diff-grid">
                    <button class="diff-btn" data-diff="rookie" onclick="selectDiff('rookie')">
                        <span class="check">✔</span><span class="diff-icon">🟢</span>
                        <span class="diff-name">Rookie</span>
                        <span class="diff-desc">IA lenta<br>para empezar</span>
                    </button>
                    <button class="diff-btn selected" data-diff="hacker" onclick="selectDiff('hacker')">
                        <span class="check">✔</span><span class="diff-icon">🟡</span>
                        <span class="diff-name">Hacker</span>
                        <span class="diff-desc">Desafío<br>equilibrado</span>
                    </button>
                    <button class="diff-btn" data-diff="elite" onclick="selectDiff('elite')">
                        <span class="check">✔</span><span class="diff-icon">🔴</span>
                        <span class="diff-name">Elite</span>
                        <span class="diff-desc">IA agresiva<br>sin piedad</span>
                    </button>
                    <button class="diff-btn" data-diff="god" onclick="selectDiff('god')">
                        <span class="check">✔</span><span class="diff-icon">👾</span>
                        <span class="diff-name">GOD</span>
                        <span class="diff-desc">Reacción<br>perfecta</span>
                    </button>
                </div>
            </div>

            <button class="btn" onclick="startGame()">INICIAR PARTIDO</button>
        </div>
    </div>

    <div id="game-over" class="overlay hidden" style="background: rgba(0,0,0,0.92);">
        <div class="overlay-content" style="backdrop-filter:none;">
            <h2 id="winner-text" style="font-size: 45px; color: white;">FINAL DEL PARTIDO</h2>
            <p id="final-score" style="font-size: 25px; margin: 20px 0; white-space: pre-line;"></p>
            <button class="btn" onclick="location.reload()">REINICIAR</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div id="game-wrapper">
            <div>
                <div id="timer-display">00:00</div>
                <span id="difficulty-badge"></span>
            </div>
            <canvas id="canvas" width="1200" height="700"></canvas>
            <div class="score-board">
                <div id="p1-box">LOCAL: <span id="p1-score">0</span></div>
                <div id="p2-box">VISITANTE: <span id="p2-score">0</span></div>
            </div>
        </div>
    </div>

    <script>
        const menuVideo = document.getElementById('menu-bg-video');
        const tapBtn    = document.getElementById('tap-to-play');

        function tryPlayMenuVideo() {
            const p = menuVideo.play();
            if (p !== undefined) {
                p.then(() => tapBtn.style.display = 'none')
                 .catch(() => tapBtn.style.display = 'block');
            }
        }
        function unlockVideo() {
            menuVideo.play().then(() => tapBtn.style.display = 'none').catch(() => {});
        }
        window.addEventListener('DOMContentLoaded', tryPlayMenuVideo);
        document.addEventListener('click', () => { if (menuVideo.paused) menuVideo.play().catch(() => {}); }, { once: true });

        const ASPECT = 1200 / 700;
        const MARGIN = 0.10;

        const canvas = document.getElementById('canvas');
        const ctx    = canvas.getContext('2d');

        function resizeCanvas() {
            const maxW = window.innerWidth  * (1 - MARGIN * 2);
            const maxH = window.innerHeight * (1 - MARGIN * 2) - 80;
            let w, h;
            if (maxW / ASPECT <= maxH) { w = maxW; h = maxW / ASPECT; }
            else                       { h = maxH; w = maxH * ASPECT;  }
            canvas.style.width  = w + 'px';
            canvas.style.height = h + 'px';
        }
        window.addEventListener('resize', resizeCanvas);

        const balon  = document.getElementById('balon');
        const iaImg  = document.getElementById('iaImg');
        const botImg = document.getElementById('botImg');
        const fondo  = document.getElementById('fondo');

        const PALA_W = 100, PALA_H = 130, BALL_R = 15;

        const DIFFICULTIES = {
            rookie: { label:'🟢 ROOKIE', color:'#4ec94e', aiSpeed:0.055, aiMaxSpeed:5,   aiReactionDelay:18, ballBaseSpeed:3.5, startSpeed:1.5, accel:1.03, description:'ROOKIE'   },
            hacker: { label:'🟡 HACKER', color:'#f0c040', aiSpeed:0.12,  aiMaxSpeed:9,   aiReactionDelay:8,  ballBaseSpeed:5,   startSpeed:2,   accel:1.05, description:'HACKER'   },
            elite:  { label:'🔴 ELITE',  color:'#ff4444', aiSpeed:0.22,  aiMaxSpeed:14,  aiReactionDelay:3,  ballBaseSpeed:6.5, startSpeed:2.5, accel:1.07, description:'ELITE'    },
            god:    { label:'👾 GOD',    color:'#cc44ff', aiSpeed:0.99,  aiMaxSpeed:999, aiReactionDelay:0,  ballBaseSpeed:8,   startSpeed:2.5, accel:1.09, description:'GOD MODE' }
        };

        let selectedDiff = 'hacker';
        let diffCfg      = DIFFICULTIES[selectedDiff];
        let selectedMode = '1p';

        let active = false, gameTime = 0, frameCount = 0, particles = [];
        let ballHistory = [], lastGoalSide = null;

        const p1   = { x: 30,   y: 0, score: 0 };
        const p2   = { x: 1070, y: 0, score: 0 };
        const ball = { x: 600,  y: 350, vx: 0, vy: 0, currentSpeed: 0 };
        const keys = {};

        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup   = e => keys[e.key.toLowerCase()] = false;

        function selectMode(m) {
            selectedMode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector(`.mode-btn[data-mode="${m}"]`).classList.add('selected');
            if (m === '2p') {
                document.getElementById('diff-section').classList.add('hidden');
                document.getElementById('ctrl-1p').style.display = 'none';
                document.getElementById('ctrl-2p').style.display = 'inline';
            } else {
                document.getElementById('diff-section').classList.remove('hidden');
                document.getElementById('ctrl-1p').style.display = 'inline';
                document.getElementById('ctrl-2p').style.display = 'none';
            }
        }

        function selectDiff(d) {
            selectedDiff = d;
            diffCfg = DIFFICULTIES[d];
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector(`.diff-btn[data-diff="${d}"]`).classList.add('selected');
        }

        function startGame() {
            menuVideo.pause();
            menuVideo.style.display = 'none';
            tapBtn.style.display = 'none';

            document.getElementById('menu').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');

            resizeCanvas();

            const badge = document.getElementById('difficulty-badge');
            if (selectedMode === '2p') {
                diffCfg = { ballBaseSpeed:5, startSpeed:2, accel:1.05, color:'#00cfff' };
                badge.innerText = '👥 2 JUGADORES';
                badge.style.color = '#00cfff';
                badge.style.borderColor = '#00cfff';
                badge.style.boxShadow = '0 0 12px #00cfff66';
            } else {
                badge.innerText = diffCfg.description;
                badge.style.color = diffCfg.color;
                badge.style.borderColor = diffCfg.color;
                badge.style.boxShadow = `0 0 12px ${diffCfg.color}66`;
            }

            document.getElementById('p1-box').innerHTML = selectedMode === '2p'
                ? '🟦 J1 (W/S): <span id="p1-score">0</span>'
                : 'LOCAL: <span id="p1-score">0</span>';
            document.getElementById('p2-box').innerHTML = selectedMode === '2p'
                ? '🟥 J2 (↑/↓): <span id="p2-score">0</span>'
                : 'VISITANTE: <span id="p2-score">0</span>';

            p1.score = 0; p2.score = 0;
            p1.y = p2.y = canvas.height / 2 - PALA_H / 2;

            fondo.play().catch(() => {});
            active = true;
            resetBall(true);
            loop();
        }

        function resetBall(initial = false) {
            ball.x = canvas.width  / 2;
            ball.y = canvas.height / 2;
            ball.currentSpeed = diffCfg.startSpeed;

            const angle = (Math.random() - 0.5) * 0.4;
            const dirX  = initial
                ? (Math.random() > 0.5 ? 1 : -1)
                : (lastGoalSide === 'right' ? -1 : 1);

            ball.vx = dirX * diffCfg.startSpeed * Math.cos(angle);
            ball.vy = diffCfg.startSpeed * Math.sin(angle);
            ballHistory = [];
            updateUI();
        }

        function updateUI() {
            document.getElementById('p1-score').innerText = p1.score;
            document.getElementById('p2-score').innerText = p2.score;
            const b1 = document.getElementById('p1-box'), b2 = document.getElementById('p2-box');
            if      (p1.score > p2.score) { b1.className = 'winning'; b2.className = 'losing'; }
            else if (p2.score > p1.score) { b2.className = 'winning'; b1.className = 'losing'; }
            else                          { b1.className = 'tie';     b2.className = 'tie';    }
        }

        function loop() {
            if (!active) return;
            update(); draw(); checkEndGame();
            requestAnimationFrame(loop);
        }

        function update() {
            frameCount++;
            if (frameCount % 60 === 0) gameTime++;

            const W = canvas.width, H = canvas.height;

            if (keys['w']) p1.y = Math.max(0, p1.y - 12);
            if (keys['s']) p1.y = Math.min(H - PALA_H, p1.y + 12);

            if (selectedMode === '2p') {
                if (keys['arrowup'])   p2.y = Math.max(0, p2.y - 12);
                if (keys['arrowdown']) p2.y = Math.min(H - PALA_H, p2.y + 12);
            } else {
                ballHistory.push({ x: ball.x, y: ball.y });
                if (ballHistory.length > (diffCfg.aiReactionDelay || 0) + 1) ballHistory.shift();
                const pb = ballHistory[0] || ball;
                const shouldTrack = selectedDiff === 'god' || ball.vx > 0;
                const targetY = shouldTrack ? pb.y - PALA_H / 2 : H / 2 - PALA_H / 2;
                let delta = (targetY - p2.y) * (diffCfg.aiSpeed || 0.12);
                delta = Math.max(-(diffCfg.aiMaxSpeed || 9), Math.min((diffCfg.aiMaxSpeed || 9), delta));
                p2.y = Math.max(0, Math.min(H - PALA_H, p2.y + delta));
            }

            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.currentSpeed < diffCfg.ballBaseSpeed) {
                ball.currentSpeed += 0.02;
                const spd = Math.hypot(ball.vx, ball.vy);
                if (spd > 0) { ball.vx = ball.vx / spd * ball.currentSpeed; ball.vy = ball.vy / spd * ball.currentSpeed; }
            }

            if (ball.y < BALL_R)     { ball.vy = Math.abs(ball.vy);  ball.y = BALL_R; }
            if (ball.y > H - BALL_R) { ball.vy = -Math.abs(ball.vy); ball.y = H - BALL_R; }

            if (ball.vx < 0 && ball.x - BALL_R < p1.x + PALA_W && ball.x > p1.x && ball.y > p1.y && ball.y < p1.y + PALA_H) {
                ball.vx = Math.abs(ball.vx) * diffCfg.accel;
                ball.vy += (ball.y - (p1.y + PALA_H / 2)) * 0.2;
                ball.x = p1.x + PALA_W + BALL_R;
                ball.currentSpeed = Math.hypot(ball.vx, ball.vy);
            }
            if (ball.vx > 0 && ball.x + BALL_R > p2.x && ball.x < p2.x + PALA_W && ball.y > p2.y && ball.y < p2.y + PALA_H) {
                ball.vx = -Math.abs(ball.vx) * diffCfg.accel;
                ball.vy += (ball.y - (p2.y + PALA_H / 2)) * 0.2;
                ball.x = p2.x - BALL_R;
                ball.currentSpeed = Math.hypot(ball.vx, ball.vy);
            }

            if (ball.x < 0) { lastGoalSide = 'left';  p2.score++; resetBall(); }
            if (ball.x > W) { lastGoalSide = 'right'; p1.score++; resetBall(); }

            const m = Math.floor(gameTime / 60).toString().padStart(2, '0');
            const s = (gameTime % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        function checkEndGame() {
            let reason = '';
            if (gameTime >= 90) reason = "FIN DEL TIEMPO REGLAMENTARIO (90')";
            if (p1.score >= 10 || p2.score >= 10) reason = 'LÍMITE DE GOLES ALCANZADO';
            if (!reason) return;

            active = false;
            let winTxt;
            if (selectedMode === '2p') {
                winTxt = p1.score > p2.score ? '🟦 ¡JUGADOR 1 GANA!' : (p2.score > p1.score ? '🟥 ¡JUGADOR 2 GANA!' : '¡EMPATE AMISTOSO!');
            } else {
                winTxt = p1.score > p2.score ? '¡HUMANO CAMPEÓN!' : (p2.score > p1.score ? '¡BOT HACKER VENCE!' : '¡EMPATE AMISTOSO!');
            }
            document.getElementById('winner-text').innerText = winTxt;
            document.getElementById('final-score').innerText =
                `Modo: ${selectedMode === '2p' ? '2 Jugadores' : diffCfg.description}\n${reason}\nMarcador Final: ${p1.score} - ${p2.score}`;
            document.getElementById('game-over').classList.remove('hidden');
        }

        function draw() {
            const W = canvas.width, H = canvas.height;
            ctx.clearRect(0, 0, W, H);

            if (fondo.readyState >= 2) {
                ctx.drawImage(fondo, 0, 0, W, H);
            } else {
                ctx.fillStyle = '#0a2a0a'; ctx.fillRect(0, 0, W, H);
            }

            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.setLineDash([15, 15]);
            ctx.strokeRect(0, 0, W, H);
            ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
            ctx.setLineDash([]);

            ctx.save();
            if (selectedMode === '2p') {
                ctx.shadowBlur = 15; ctx.shadowColor = '#00cfff';
                ctx.strokeStyle = '#00cfff88'; ctx.lineWidth = 4;
                ctx.strokeRect(p1.x - 5, p1.y - 5, PALA_W + 10, PALA_H + 10);
            }
            if (iaImg.complete) {
                ctx.scale(-1, 1);
                ctx.drawImage(iaImg, -(p1.x + PALA_W), p1.y, PALA_W, PALA_H);
            }
            ctx.restore();

            const auraColor = selectedMode === '2p' ? '#ff4444' : diffCfg.color;
            ctx.save();
            ctx.shadowBlur = selectedDiff === 'god' && selectedMode === '1p' ? 30 : 15;
            ctx.shadowColor = auraColor;
            const alpha = Math.floor((0.4 + Math.sin(frameCount * 0.2) * 0.3) * 255).toString(16).padStart(2, '00');
            ctx.strokeStyle = `${auraColor}${alpha}`;
            ctx.lineWidth = selectedDiff === 'god' && selectedMode === '1p' ? 5 : 4;
            ctx.strokeRect(p2.x - 5, p2.y - 5, PALA_W + 10, PALA_H + 10);
            if (botImg.complete) {
                ctx.scale(-1, 1);
                ctx.drawImage(botImg, -(p2.x + PALA_W), p2.y, PALA_W, PALA_H);
            }
            ctx.restore();

            if (Math.random() > 0.8) particles.push({
                x: p2.x + Math.random() * PALA_W, y: p2.y + PALA_H,
                v: -Math.random() * 3 - 1, l: 1, c: auraColor, type: 'h'
            });

            particles.push({ x: ball.x, y: ball.y, v: (Math.random() - 0.5) * 2, l: 1, c: Math.random() > 0.3 ? 'orange' : 'red', type: 'f' });
            const g = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, 30);
            g.addColorStop(0, '#fff'); g.addColorStop(0.4, '#ff0'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(ball.x, ball.y, 30, 0, Math.PI * 2); ctx.fill();

            if (balon.complete) {
                ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(frameCount * 0.1);
                ctx.drawImage(balon, -BALL_R, -BALL_R, BALL_R * 2, BALL_R * 2);
                ctx.restore();
            }

            particles.forEach((p, i) => {
                ctx.fillStyle = p.c; ctx.globalAlpha = p.l;
                ctx.fillRect(p.x, p.y, p.type === 'h' ? 4 : 6, p.type === 'h' ? 4 : 6);
                p.y += p.v; p.l -= 0.015;
                if (p.l <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;
        }
    </script>
</body>
