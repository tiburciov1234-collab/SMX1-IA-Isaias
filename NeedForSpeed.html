<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NITRO PURSUIT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  #speedometer { position: absolute; bottom: 30px; right: 30px; width: 160px; height: 160px; }
  #speed-value { position: absolute; bottom: 85px; right: 30px; width: 160px; text-align: center; font-family: 'Orbitron', monospace; font-size: 38px; font-weight: 900; color: #fff; text-shadow: 0 0 20px #00eaff, 0 0 40px #00eaff; letter-spacing: 2px; }
  #speed-unit { position: absolute; bottom: 70px; right: 30px; width: 160px; text-align: center; font-family: 'Rajdhani', sans-serif; font-size: 14px; color: #00eaff88; letter-spacing: 4px; }
  #nitro-bar-container { position: absolute; bottom: 28px; right: 210px; width: 180px; }
  #nitro-label { font-family: 'Orbitron', monospace; font-size: 11px; color: #ff6a00; letter-spacing: 3px; margin-bottom: 6px; }
  #nitro-bar-bg { width: 100%; height: 14px; background: #111; border: 1px solid #ff6a0055; border-radius: 7px; overflow: hidden; box-shadow: 0 0 10px #ff6a0044; }
  #nitro-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #ff6a00, #ffcc00); border-radius: 7px; transition: width 0.1s; box-shadow: 0 0 12px #ff6a00; }
  #health-bar-container { position: absolute; bottom: 60px; right: 210px; width: 180px; }
  #health-label { font-family: 'Orbitron', monospace; font-size: 11px; color: #00ff88; letter-spacing: 3px; margin-bottom: 6px; }
  #health-bar-bg { width: 100%; height: 14px; background: #111; border: 1px solid #00ff8855; border-radius: 7px; overflow: hidden; box-shadow: 0 0 10px #00ff8844; }
  #health-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #00ff88, #00eaff); border-radius: 7px; transition: width 0.2s; box-shadow: 0 0 12px #00ff88; }
  #top-hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; align-items: center; background: rgba(0,0,0,0.6); border: 1px solid #ffffff22; border-radius: 12px; padding: 10px 30px; backdrop-filter: blur(10px); }
  .hud-item { text-align: center; }
  .hud-label { font-size: 10px; color: #ffffff55; letter-spacing: 3px; font-family: 'Orbitron', monospace; }
  .hud-value { font-size: 22px; font-family: 'Orbitron', monospace; font-weight: 700; color: #fff; text-shadow: 0 0 10px #00eaff88; }
  #lap-value { color: #ffcc00; text-shadow: 0 0 10px #ffcc0088; }
  #pos-value { color: #ff4466; text-shadow: 0 0 10px #ff446688; }
  #police-alert { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 900; color: #fff; background: linear-gradient(90deg, #ff0022, #cc0044); padding: 10px 30px; border-radius: 8px; letter-spacing: 4px; opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 10px #fff; box-shadow: 0 0 30px #ff002288; }
  #collision-alert { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 900; color: #fff; background: linear-gradient(90deg, #ff6600, #ff2200); padding: 12px 36px; border-radius: 8px; letter-spacing: 5px; opacity: 0; transition: opacity 0.15s; text-shadow: 0 0 10px #fff; box-shadow: 0 0 40px #ff660088; pointer-events: none; white-space: nowrap; }
  #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: opacity 0.1s; background: radial-gradient(ellipse at center, transparent 40%, #ff000055 100%); }
  #minimap-container { position: absolute; bottom: 30px; left: 30px; }
  #minimap-label { font-family: 'Orbitron', monospace; font-size: 9px; color: #ffffff44; letter-spacing: 3px; margin-bottom: 4px; }
  #minimap { border: 1px solid #ffffff33; border-radius: 6px; background: rgba(0,0,0,0.7); }
  .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: radial-gradient(ellipse at center, #0a0a1a 0%, #000000 100%); }
  .screen-title { font-family: 'Orbitron', monospace; font-size: 72px; font-weight: 900; letter-spacing: 8px; background: linear-gradient(135deg, #00eaff, #ff6a00, #ff004c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 10px; animation: titlePulse 2s ease-in-out infinite; }
  @keyframes titlePulse { 0%, 100% { filter: drop-shadow(0 0 20px #00eaff44); } 50% { filter: drop-shadow(0 0 40px #ff6a0088); } }
  .screen-subtitle { font-family: 'Rajdhani', sans-serif; font-size: 16px; color: #ffffff55; letter-spacing: 8px; margin-bottom: 60px; }
  .menu-btn { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700; letter-spacing: 4px; padding: 16px 50px; margin: 8px; border: 1px solid; border-radius: 4px; cursor: pointer; transition: all 0.2s; pointer-events: all; background: transparent; text-transform: uppercase; }
  .btn-primary { border-color: #00eaff; color: #00eaff; box-shadow: 0 0 20px #00eaff22, inset 0 0 20px #00eaff11; }
  .btn-primary:hover { background: #00eaff22; box-shadow: 0 0 30px #00eaff66; transform: translateY(-2px); }
  .btn-easy { border-color: #00ff88; color: #00ff88; } .btn-easy:hover { background: #00ff8822; }
  .btn-normal { border-color: #ffcc00; color: #ffcc00; } .btn-normal:hover { background: #ffcc0022; }
  .btn-hard { border-color: #ff4466; color: #ff4466; } .btn-hard:hover { background: #ff446622; }
  .diff-label { font-family: 'Rajdhani', sans-serif; font-size: 18px; color: #ffffff66; letter-spacing: 6px; margin-bottom: 20px; }
  #controls-hint { margin-top: 50px; font-size: 13px; color: #ffffff33; letter-spacing: 2px; text-align: center; }
  #controls-hint span { color: #ffffff66; font-family: 'Orbitron', monospace; font-size: 11px; }
  #result-screen .screen-title { font-size: 52px; }
  #result-score { font-family: 'Orbitron', monospace; font-size: 20px; color: #ffcc00; margin-bottom: 40px; letter-spacing: 3px; text-align: center; }
  #powerup-display { position: absolute; top: 20px; right: 30px; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .powerup-badge { font-family: 'Orbitron', monospace; font-size: 11px; padding: 5px 12px; border-radius: 4px; letter-spacing: 2px; animation: badgePulse 1s ease-in-out infinite; }
  @keyframes badgePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  #stars-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
  #collision-count { position: absolute; top: 20px; left: 30px; font-family: 'Orbitron', monospace; font-size: 11px; color: #ff4466aa; letter-spacing: 2px; }
  #collision-count span { font-size: 18px; color: #ff4466; font-weight: 900; text-shadow: 0 0 10px #ff4466; }
</style>
</head>
<body>
<div id="stars-bg"></div>
<canvas id="gameCanvas"></canvas>
<div id="ui-overlay" style="display:none;">
  <div id="top-hud">
    <div class="hud-item"><div class="hud-label">VUELTA</div><div class="hud-value" id="lap-value">1/3</div></div>
    <div class="hud-item"><div class="hud-label">POSICIÓN</div><div class="hud-value" id="pos-value">1°</div></div>
    <div class="hud-item"><div class="hud-label">TIEMPO</div><div class="hud-value" id="time-value">0:00</div></div>
    <div class="hud-item"><div class="hud-label">NIVEL</div><div class="hud-value" id="level-value">1</div></div>
  </div>
  <div id="police-alert">⚠ POLICÍA EN PERSECUCIÓN</div>
  <div id="collision-alert">💥 COLISIÓN</div>
  <div id="damage-overlay"></div>
  <div id="collision-count">COLISIONES <span id="collision-num">0</span></div>
  <div id="powerup-display"></div>
  <canvas id="speedometer" width="160" height="160"></canvas>
  <div id="speed-value">0</div>
  <div id="speed-unit">KM/H</div>
  <div id="nitro-bar-container"><div id="nitro-label">⚡ NITRO</div><div id="nitro-bar-bg"><div id="nitro-bar"></div></div></div>
  <div id="health-bar-container"><div id="health-label">❤ DAÑO</div><div id="health-bar-bg"><div id="health-bar"></div></div></div>
  <div id="minimap-container"><div id="minimap-label">MAPA</div><canvas id="minimap" width="140" height="140"></canvas></div>
</div>
<div class="screen" id="start-screen">
  <div class="screen-title">NITRO<br>PURSUIT</div>
  <div class="screen-subtitle">STREET RACING UNDERGROUND</div>
  <div class="diff-label">SELECCIONA DIFICULTAD</div>
  <button class="menu-btn btn-easy" onclick="startGame('easy')">FÁCIL</button>
  <button class="menu-btn btn-normal" onclick="startGame('normal')">NORMAL</button>
  <button class="menu-btn btn-hard" onclick="startGame('hard')">DIFÍCIL</button>
  <div id="controls-hint"><span>W/↑</span> ACELERAR &nbsp;|&nbsp; <span>S/↓</span> FRENAR &nbsp;|&nbsp; <span>A/← D/→</span> GIRAR &nbsp;|&nbsp; <span>SPACE</span> NITRO</div>
</div>
<div class="screen" id="result-screen" style="display:none;">
  <div class="screen-title" id="result-title">FIN</div>
  <div id="result-score"></div>
  <button class="menu-btn btn-primary" onclick="showStartScreen()">MENÚ PRINCIPAL</button>
  <button class="menu-btn btn-normal" onclick="startGame(lastDifficulty)">REINTENTAR</button>
</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const minimapCanvas=document.getElementById('minimap'),mctx=minimapCanvas.getContext('2d');
const spdCanvas=document.getElementById('speedometer'),sctx=spdCanvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

(function(){
  const c=document.getElementById('stars-bg');
  for(let i=0;i<150;i++){const s=document.createElement('div');s.style.cssText=`position:absolute;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;background:white;border-radius:50%;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*0.7+0.1};animation:starTwinkle ${Math.random()*3+2}s ease-in-out infinite;animation-delay:${Math.random()*3}s;`;c.appendChild(s);}
  const st=document.createElement('style');st.textContent='@keyframes starTwinkle{0%,100%{opacity:0.1}50%{opacity:0.8}}';document.head.appendChild(st);
})();

function generateTrack(level){
  const tracks=[
    [{x:400,y:400},{x:1000,y:300},{x:1600,y:320},{x:1900,y:500},{x:2000,y:900},{x:1900,y:1300},{x:1600,y:1500},{x:1000,y:1600},{x:500,y:1500},{x:300,y:1200},{x:280,y:800},{x:350,y:550}],
    [{x:300,y:600},{x:700,y:350},{x:1200,y:300},{x:1600,y:400},{x:1900,y:600},{x:2000,y:900},{x:1800,y:1200},{x:1500,y:1400},{x:1200,y:1500},{x:900,y:1450},{x:600,y:1300},{x:400,y:1100},{x:350,y:850}],
    [{x:300,y:500},{x:600,y:300},{x:1000,y:250},{x:1400,y:300},{x:1700,y:200},{x:2000,y:400},{x:2100,y:700},{x:2000,y:1000},{x:1800,y:1200},{x:1500,y:1500},{x:1200,y:1700},{x:800,y:1750},{x:500,y:1600},{x:300,y:1300},{x:200,y:1000},{x:250,y:750}]
  ];
  return tracks[Math.min(level-1,tracks.length-1)];
}
function catmullRom(pts,seg=20){
  const r=[],n=pts.length;
  for(let i=0;i<n;i++){
    const p0=pts[(i-1+n)%n],p1=pts[i],p2=pts[(i+1)%n],p3=pts[(i+2)%n];
    for(let t=0;t<seg;t++){const s=t/seg,s2=s*s,s3=s2*s;r.push({x:.5*((2*p1.x)+(-p0.x+p2.x)*s+(2*p0.x-5*p1.x+4*p2.x-p3.x)*s2+(-p0.x+3*p1.x-3*p2.x+p3.x)*s3),y:.5*((2*p1.y)+(-p0.y+p2.y)*s+(2*p0.y-5*p1.y+4*p2.y-p3.y)*s2+(-p0.y+3*p1.y-3*p2.y+p3.y)*s3)});}
  }
  return r;
}

let game=null,lastDifficulty='normal',animFrame=null;
const DIFF={easy:{rs:2.2,td:3,ps:2.8,pt:180,laps:3,cd:12},normal:{rs:3.2,td:5,ps:3.8,pt:140,laps:3,cd:20},hard:{rs:4.2,td:8,ps:5.0,pt:100,laps:3,cd:30}};

function shadeColor(c,a){const n=parseInt(c.replace('#',''),16);const r=Math.max(0,Math.min(255,(n>>16)+a)),g=Math.max(0,Math.min(255,((n>>8)&255)+a)),b=Math.max(0,Math.min(255,(n&255)+a));return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');}
function blendColor(h1,h2,t){const a=parseInt(h1.replace('#',''),16),b=parseInt(h2.replace('#',''),16);const r=Math.round(((a>>16)&255)*(1-t)+((b>>16)&255)*t),g=Math.round(((a>>8)&255)*(1-t)+((b>>8)&255)*t),bl=Math.round((a&255)*(1-t)+(b&255)*t);return '#'+((r<<16)|(g<<8)|bl).toString(16).padStart(6,'0');}

// SAT Collision
function getAxes(corn){const ax=[];for(let i=0;i<corn.length;i++){const a=corn[i],b=corn[(i+1)%corn.length];ax.push({x:-(b.y-a.y),y:b.x-a.x});}return ax;}
function project(corn,ax){let mn=Infinity,mx=-Infinity;const l=Math.sqrt(ax.x*ax.x+ax.y*ax.y),nx=ax.x/l,ny=ax.y/l;for(const c of corn){const p=c.x*nx+c.y*ny;if(p<mn)mn=p;if(p>mx)mx=p;}return{min:mn,max:mx};}
function satTest(a,b){
  const aa=a.getAABB(),ab=b.getAABB();
  if(aa.maxX<ab.minX||aa.minX>ab.maxX||aa.maxY<ab.minY||aa.minY>ab.maxY)return null;
  const ca=a.getCorners(),cb=b.getCorners(),axes=[...getAxes(ca),...getAxes(cb)];
  let mo=Infinity,ma=null;
  for(const ax of axes){const pA=project(ca,ax),pB=project(cb,ax),ov=Math.min(pA.max,pB.max)-Math.max(pA.min,pB.min);if(ov<=0)return null;if(ov<mo){mo=ov;const l=Math.sqrt(ax.x*ax.x+ax.y*ax.y);ma={x:ax.x/l,y:ax.y/l};}}
  const dx=a.x-b.x,dy=a.y-b.y;if(dx*ma.x+dy*ma.y<0){ma.x=-ma.x;ma.y=-ma.y;}
  return{overlap:mo,normal:ma};
}

class Car{
  constructor(x,y,color,isPlayer=false){
    this.x=x;this.y=y;this.angle=0;this.speed=0;this.maxSpeed=isPlayer?6:4;this.color=color;
    this.width=28;this.height=14;this.isPlayer=isPlayer;
    this.health=100;this.nitro=100;this.shieldTimer=0;
    this.trackProgress=0;this.lap=1;this.finished=false;this.offTrack=false;this.driftAngle=0;
    this.collisionCooldown=0;this.collisionFlash=0;
  }
  getCorners(){const cos=Math.cos(this.angle),sin=Math.sin(this.angle),hw=this.width/2,hh=this.height/2;return[{x:-hw,y:-hh},{x:hw,y:-hh},{x:hw,y:hh},{x:-hw,y:hh}].map(c=>({x:this.x+c.x*cos-c.y*sin,y:this.y+c.x*sin+c.y*cos}));}
  getAABB(){const r=Math.sqrt(this.width*this.width+this.height*this.height)/2;return{minX:this.x-r,maxX:this.x+r,minY:this.y-r,maxY:this.y+r};}
}

class NitroPursuit{
  constructor(diff,level){
    this.diff=diff;this.cfg=DIFF[diff];this.level=level;this.W=2400;this.H=2400;
    this.controlPoints=generateTrack(level);this.spline=catmullRom(this.controlPoints,25);this.trackWidth=160+level*8;
    const sp=this.spline[0];
    this.player=new Car(sp.x,sp.y,'#00eaff',true);this.player.angle=this.getTA(0);this.player.maxSpeed=7;
    this.camX=this.player.x-canvas.width/2;this.camY=this.player.y-canvas.height/2;
    this.rivals=[];this.initRivals();this.police=[];this.policeActive=false;this.policeAlertTimer=0;
    this.traffic=[];this.initTraffic();this.powerups=[];this.initPowerups();
    this.totalLaps=this.cfg.laps;this.startTime=Date.now();this.elapsed=0;
    this.finished=false;this.gameOver=false;this.keys={};this.bindInput();
    try{this.audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){this.audioCtx=null;}
    this.particles=[];this.skidMarks=[];this.sirenPhase=0;this.screenShake=0;this.screenFlash=0;this.flashColor='#ff0000';
    this.totalCollisions=0;this.collisionAlertTimer=0;this.damageLabels=[];
  }
  initRivals(){
    const cols=['#ff4466','#ffcc00','#aa44ff','#ff8800'];
    for(let i=0;i<3;i++){const off=5+i*15,sp=this.spline[off%this.spline.length];const r=new Car(sp.x+(i%2===0?20:-20),sp.y+(i%2===0?10:-10),cols[i]);r.angle=this.getTA(off);r.maxSpeed=this.cfg.rs+Math.random();r.trackProgress=off;r.lap=1;this.rivals.push(r);}
  }
  initTraffic(){
    const cols=['#888','#aaa','#cc8800','#0088cc'];
    for(let i=0;i<this.cfg.td;i++){const off=Math.floor(Math.random()*this.spline.length),sp=this.spline[off];const t=new Car(sp.x,sp.y,cols[Math.floor(Math.random()*cols.length)]);t.angle=this.getTA(off);t.maxSpeed=1.5+Math.random();t.trackProgress=off;t.lap=0;this.traffic.push(t);}
  }
  initPowerups(){
    const types=['nitro','repair','shield'];
    for(let i=0;i<8;i++){const off=Math.floor((i/8)*this.spline.length),sp=this.spline[off],ang=this.getTA(off),side=(i%2===0?1:-1)*25;this.powerups.push({x:sp.x+Math.sin(ang)*side,y:sp.y-Math.cos(ang)*side,type:types[i%types.length],collected:false,respawnTimer:0,pulse:0});}
  }
  getTA(idx){const n=this.spline.length,a=this.spline[idx],b=this.spline[(idx+1)%n];return Math.atan2(b.y-a.y,b.x-a.x);}
  bindInput(){this._kd=e=>{this.keys[e.code]=true;if(['Space','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();};this._ku=e=>{this.keys[e.code]=false;};document.addEventListener('keydown',this._kd);document.addEventListener('keyup',this._ku);}
  destroy(){document.removeEventListener('keydown',this._kd);document.removeEventListener('keyup',this._ku);}

  update(dt){
    if(this.finished||this.gameOver)return;
    this.elapsed=(Date.now()-this.startTime)/1000;this.sirenPhase+=0.08;
    if(this.screenShake>0)this.screenShake-=dt*30;if(this.screenFlash>0)this.screenFlash-=dt*3;
    if(this.collisionAlertTimer>0){this.collisionAlertTimer-=dt;if(this.collisionAlertTimer<=0){document.getElementById('collision-alert').style.opacity='0';document.getElementById('damage-overlay').style.opacity='0';}}
    this.updatePlayer(dt);this.updateRivals(dt);this.updateTraffic(dt);this.updatePolice(dt);
    this.updatePowerups(dt);this.updateParticles(dt);this.updateDamageLabels(dt);
    this.resolveCollisions(dt);
    this.updateCamera(dt);this.checkLaps();
    if(this.player.speed*30>this.cfg.pt&&!this.policeActive)this.triggerPolice();
  }

  resolveCollisions(dt){
    const p=this.player,others=[...this.rivals,...this.traffic,...this.police];
    if(p.collisionCooldown>0)p.collisionCooldown-=dt;
    for(const o of others){
      if(o.collisionCooldown>0)o.collisionCooldown-=dt;
      const res=satTest(p,o);if(!res)continue;
      const{overlap,normal}=res;
      // Separate
      p.x+=normal.x*overlap*.8;p.y+=normal.y*overlap*.8;
      o.x-=normal.x*overlap*.2;o.y-=normal.y*overlap*.2;
      // Bounce
      const pvx=Math.cos(p.angle)*p.speed,pvy=Math.sin(p.angle)*p.speed;
      const ovx=Math.cos(o.angle)*o.speed,ovy=Math.sin(o.angle)*o.speed;
      const rvx=pvx-ovx,rvy=pvy-ovy,rvn=rvx*normal.x+rvy*normal.y;
      if(rvn>0)continue;
      const imp=-(1+.45)*rvn/2;
      const npvx=pvx+imp*normal.x,npvy=pvy+imp*normal.y;
      p.speed=Math.sqrt(npvx*npvx+npvy*npvy);
      if(p.speed>.01)p.angle=Math.atan2(npvy,npvx);
      p.speed=Math.min(p.speed,p.maxSpeed*1.1);
      o.speed=Math.max(.3,o.speed*.6);
      // Damage
      if(p.collisionCooldown<=0&&p.shieldTimer<=0){
        const imp2=Math.abs(rvn),dmg=this.cfg.cd*Math.min(1,imp2/3);
        if(dmg>2){
          p.health=Math.max(0,p.health-dmg);p.collisionCooldown=.6;this.totalCollisions++;
          this.screenShake=Math.min(2,imp2*.5);this.screenFlash=Math.min(.6,imp2*.12);this.flashColor='#ff4400';p.collisionFlash=.8;
          this.spawnImpact((p.x+o.x)/2,(p.y+o.y)/2,imp2);this.playSound('crash');this.showCollAlert(dmg);
          this.damageLabels.push({x:p.x,y:p.y-30,text:'-'+Math.round(dmg)+' HP',life:1.5,alpha:1,vy:-40});
          if(p.health<=0){this.gameOver=true;showResultScreen(false,this);}
        }
      }
    }
  }
  spawnImpact(cx,cy,spd){
    const cols=['#ffcc00','#ff6600','#ff2200','#ffffff','#ffaa00'];
    for(let i=0;i<Math.floor(10+spd*4);i++){const a=Math.random()*Math.PI*2,v=2+Math.random()*spd*.8;this.spawnParticle(cx,cy,cols[Math.floor(Math.random()*cols.length)],3+Math.random()*4,Math.cos(a)*v,Math.sin(a)*v,.6+Math.random()*.5);}
    for(let i=0;i<6;i++)this.spawnParticle(cx+(Math.random()-.5)*10,cy+(Math.random()-.5)*10,'#888888aa',8+Math.random()*6,(Math.random()-.5)*1.5,(Math.random()-.5)*1.5-.5,1.2);
  }
  showCollAlert(dmg){
    const el=document.getElementById('collision-alert');
    el.textContent=dmg>25?'💥 IMPACTO SEVERO':dmg>15?'⚠ COLISIÓN':'🔶 GOLPE';
    el.style.opacity='1';
    el.style.background=dmg>25?'linear-gradient(90deg,#ff0022,#cc0000)':dmg>15?'linear-gradient(90deg,#ff6600,#ff2200)':'linear-gradient(90deg,#cc6600,#ff8800)';
    document.getElementById('damage-overlay').style.opacity=Math.min(.8,dmg/30).toString();
    this.collisionAlertTimer=1.2;document.getElementById('collision-num').textContent=this.totalCollisions;
  }
  updateDamageLabels(dt){for(const l of this.damageLabels){l.y+=l.vy*dt;l.life-=dt;l.alpha=Math.max(0,l.life/1.5);}this.damageLabels=this.damageLabels.filter(l=>l.life>0);}

  updatePlayer(dt){
    const p=this.player;if(p.collisionFlash>0)p.collisionFlash-=dt*4;
    const up=this.keys['ArrowUp']||this.keys['KeyW'],down=this.keys['ArrowDown']||this.keys['KeyS'];
    const left=this.keys['ArrowLeft']||this.keys['KeyA'],right=this.keys['ArrowRight']||this.keys['KeyD'];
    let boost=1;
    if(this.keys['Space']&&p.nitro>0){boost=1.25;p.nitro=Math.max(0,p.nitro-dt*40);for(let i=0;i<3;i++)this.spawnParticle(p.x-Math.cos(p.angle)*16,p.y-Math.sin(p.angle)*16,'#ff6a00',2,(Math.random()-.5)*2,(Math.random()-.5)*2,.8);}
    else{p.nitro=Math.min(100,p.nitro+dt*12);}
    if(up)p.speed=Math.min(p.maxSpeed*boost,p.speed+.12*boost);else if(down)p.speed=Math.max(-2,p.speed-.18);else p.speed*=.96;
    if(p.offTrack)p.speed*=.92;
    if(left&&p.speed!==0){p.angle-=.045*(p.speed/p.maxSpeed)*Math.sign(p.speed);p.driftAngle=-.1;}
    else if(right&&p.speed!==0){p.angle+=.045*(p.speed/p.maxSpeed)*Math.sign(p.speed);p.driftAngle=.1;}
    else p.driftAngle*=.8;
    p.x+=Math.cos(p.angle)*p.speed;p.y+=Math.sin(p.angle)*p.speed;
    if(Math.abs(p.driftAngle)>.05&&p.speed>3){this.skidMarks.push({x:p.x,y:p.y,alpha:.4});this.spawnParticle(p.x,p.y,'#888888',6,(Math.random()-.5),(Math.random()-.5),1.5);}
    p.offTrack=!this.isOnTrack(p.x,p.y);
    if(p.speed>.5)this.spawnParticle(p.x-Math.cos(p.angle)*16,p.y-Math.sin(p.angle)*16,'#44444488',3+Math.random()*2,(Math.random()-.5)*.5,(Math.random()-.5)*.5,1);
    this.updateTP(p);
  }
  updateRivals(dt){for(const r of this.rivals)this.driveAI(r,r.maxSpeed);}
  updateTraffic(dt){for(const t of this.traffic)this.driveAI(t,t.maxSpeed);}
  driveAI(car,maxSpd){
    const n=this.spline.length,ti=(Math.floor(car.trackProgress)+8)%n,tg=this.spline[ti];
    let diff=Math.atan2(tg.y-car.y,tg.x-car.x)-car.angle;
    while(diff>Math.PI)diff-=2*Math.PI;while(diff<-Math.PI)diff+=2*Math.PI;
    car.angle+=diff*.1;car.speed=Math.min(maxSpd,car.speed+.05);
    car.x+=Math.cos(car.angle)*car.speed;car.y+=Math.sin(car.angle)*car.speed;this.updateTP(car);
  }
  updatePolice(dt){
    if(!this.policeActive)return;
    for(const cop of this.police){
      const dx=this.player.x-cop.x,dy=this.player.y-cop.y;
      let diff=Math.atan2(dy,dx)-cop.angle;while(diff>Math.PI)diff-=2*Math.PI;while(diff<-Math.PI)diff+=2*Math.PI;
      cop.angle+=diff*.12;cop.speed=Math.min(this.cfg.ps,cop.speed+.08);
      cop.x+=Math.cos(cop.angle)*cop.speed;cop.y+=Math.sin(cop.angle)*cop.speed;
      const sc=(this.sirenPhase%(Math.PI)<Math.PI/2)?'#ff0022':'#0044ff';this.spawnParticle(cop.x,cop.y-8,sc,4,(Math.random()-.5),-Math.random(),.4);
    }
    if(this.policeAlertTimer>0){this.policeAlertTimer-=dt;if(this.policeAlertTimer<=0)document.getElementById('police-alert').style.opacity='0';}
    if(this.player.shieldTimer>0)this.player.shieldTimer-=dt;
  }
  triggerPolice(){
    if(this.police.length>=3)return;this.policeActive=true;
    const off=(Math.floor(this.player.trackProgress)+40)%this.spline.length,sp=this.spline[off];
    const cop=new Car(sp.x+30,sp.y,'#1a1aff');cop.angle=this.getTA(off);cop.maxSpeed=this.cfg.ps;cop.trackProgress=off;this.police.push(cop);
    document.getElementById('police-alert').style.opacity='1';this.policeAlertTimer=3;this.playSound('siren');
  }
  updatePowerups(dt){
    for(const pu of this.powerups){pu.pulse+=dt*3;if(pu.collected){pu.respawnTimer-=dt;if(pu.respawnTimer<=0)pu.collected=false;continue;}if(Math.hypot(this.player.x-pu.x,this.player.y-pu.y)<25)this.collectPU(pu);}
  }
  collectPU(pu){
    pu.collected=true;pu.respawnTimer=15;const p=this.player;
    if(pu.type==='nitro'){p.nitro=100;this.showPUFX('⚡ NITRO FULL','#ff6a00');}
    else if(pu.type==='repair'){p.health=Math.min(100,p.health+40);this.showPUFX('❤ REPARADO','#00ff88');}
    else if(pu.type==='shield'){p.shieldTimer=5;this.showPUFX('🛡 ESCUDO','#00aaff');}
    this.screenFlash=.2;this.flashColor=pu.type==='nitro'?'#ff6a00':pu.type==='repair'?'#00ff88':'#0088ff';this.playSound('pickup');
    for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;this.spawnParticle(pu.x,pu.y,pu.type==='nitro'?'#ff6a00':pu.type==='repair'?'#00ff88':'#0088ff',5,Math.cos(a)*3,Math.sin(a)*3,.8);}
  }
  showPUFX(text,color){const d=document.getElementById('powerup-display'),b=document.createElement('div');b.className='powerup-badge';b.style.cssText=`background:${color}22;border:1px solid ${color};color:${color};`;b.textContent=text;d.appendChild(b);setTimeout(()=>b.remove(),2500);}
  updateTP(car){
    const n=this.spline.length;let best=car.trackProgress,bestDist=Infinity;
    for(let di=-3;di<=10;di++){const idx=(Math.floor(car.trackProgress)+di+n)%n,sp=this.spline[idx],d=Math.hypot(car.x-sp.x,car.y-sp.y);if(d<bestDist){bestDist=d;best=idx;}}
    car.trackProgress=best;
  }
  checkLaps(){
    const p=this.player,sp=this.spline[0],dist=Math.hypot(p.x-sp.x,p.y-sp.y);
    if(dist<50&&p._lld>50){if(p.lap<this.totalLaps){p.lap++;this.playSound('lap');}else{this.finished=true;showResultScreen(true,this);return;}}
    p._lld=dist;
    for(const r of this.rivals){const dr=Math.hypot(r.x-sp.x,r.y-sp.y);if(dr<60&&r._ld>60)r.lap=(r.lap||1)+1;r._ld=dr;}
  }
  isOnTrack(x,y){let m=Infinity;for(const sp of this.spline){const d=Math.hypot(x-sp.x,y-sp.y);if(d<m)m=d;}return m<this.trackWidth/2+10;}
  updateCamera(dt){this.camX+=(this.player.x-canvas.width/2-this.camX)*.1;this.camY+=(this.player.y-canvas.height/2-this.camY)*.1;}
  updateParticles(dt){this.particles=this.particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=dt;p.size*=.97;return p.life>0;});}
  spawnParticle(x,y,color,size,vx,vy,life){if(this.particles.length>600)return;this.particles.push({x,y,color,size,vx,vy,life,maxLife:life});}

  playSound(type){
    if(!this.audioCtx)return;const ac=this.audioCtx,g=ac.createGain();g.connect(ac.destination);
    if(type==='engine'){const o=ac.createOscillator();o.type='sawtooth';o.frequency.value=80+this.player.speed*40;g.gain.setValueAtTime(.05,ac.currentTime);o.connect(g);o.start();o.stop(ac.currentTime+.1);}
    else if(type==='siren'){const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(880,ac.currentTime);o.frequency.linearRampToValueAtTime(440,ac.currentTime+.5);g.gain.setValueAtTime(.15,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+.5);o.connect(g);o.start();o.stop(ac.currentTime+.5);}
    else if(type==='pickup'){const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(440,ac.currentTime);o.frequency.linearRampToValueAtTime(880,ac.currentTime+.2);g.gain.setValueAtTime(.15,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+.2);o.connect(g);o.start();o.stop(ac.currentTime+.2);}
    else if(type==='crash'){const buf=ac.createBuffer(1,ac.sampleRate*.3,ac.sampleRate),data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length)*.9;const s=ac.createBufferSource();s.buffer=buf;g.gain.setValueAtTime(.4,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+.3);s.connect(g);s.start();}
    else if(type==='lap'){[440,550,660].forEach((f,i)=>{const o=ac.createOscillator();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.15,ac.currentTime+i*.15);g.gain.linearRampToValueAtTime(0,ac.currentTime+i*.15+.15);o.connect(g);o.start(ac.currentTime+i*.15);o.stop(ac.currentTime+i*.15+.15);});}
  }

  draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let sx=0,sy=0;if(this.screenShake>0){sx=(Math.random()-.5)*this.screenShake*10;sy=(Math.random()-.5)*this.screenShake*10;}
    ctx.save();ctx.translate(-this.camX+sx,-this.camY+sy);
    this.drawWorld();this.drawSkids();this.drawTrack();this.drawPowerups();this.drawParticles();
    this.drawTraffic();this.drawRivals();this.drawPolice();this.drawPlayer();this.drawDmgLabels();
    ctx.restore();
    if(this.screenFlash>0){ctx.save();ctx.globalAlpha=this.screenFlash*.4;ctx.fillStyle=this.flashColor;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();}
    this.drawSpeedLines();this.updateHUD();this.drawMinimap();this.drawSpeedometer();
    if(this.player.speed>.5&&Math.random()<.05)this.playSound('engine');
  }

  drawWorld(){
    const gr=ctx.createRadialGradient(this.player.x,this.player.y,0,this.player.x,this.player.y,1200);
    gr.addColorStop(0,'#0a0a1f');gr.addColorStop(1,'#000008');ctx.fillStyle=gr;ctx.fillRect(this.camX-100,this.camY-100,canvas.width+200,canvas.height+200);
    ctx.strokeStyle='#ffffff05';ctx.lineWidth=1;
    for(let gx=0;gx<this.W;gx+=120){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,this.H);ctx.stroke();}
    for(let gy=0;gy<this.H;gy+=120){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(this.W,gy);ctx.stroke();}
    for(const b of [{x:100,y:100,w:80,h:120},{x:250,y:80,w:60,h:150},{x:2000,y:200,w:100,h:180},{x:1800,y:1600,w:80,h:130},{x:600,y:1700,w:90,h:160},{x:1200,y:100,w:70,h:110}]){
      const bg=ctx.createLinearGradient(b.x,b.y,b.x+b.w,b.y);bg.addColorStop(0,'#1a1a2e');bg.addColorStop(1,'#0f0f1f');ctx.fillStyle=bg;ctx.fillRect(b.x,b.y,b.w,b.h);
      for(let wy=b.y+10;wy<b.y+b.h-10;wy+=20)for(let wx=b.x+8;wx<b.x+b.w-8;wx+=15)if(Math.random()<.7){ctx.fillStyle=Math.random()<.3?'#ffcc0066':'#ffffff11';ctx.fillRect(wx,wy,8,10);}
    }
  }
  drawTrack(){
    const n=this.spline.length,tw=this.trackWidth;
    const dp=(lw,col)=>{ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(this.spline[0].x,this.spline[0].y);for(let i=1;i<n;i++)ctx.lineTo(this.spline[i].x,this.spline[i].y);ctx.closePath();ctx.stroke();};
    dp(tw+30,'#00eaff18');dp(tw,'#1a1a2e');dp(tw-6,'#252535');
    const de=(off,col)=>{ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<n;i++){const sp=this.spline[i],ang=this.getTA(i)+Math.PI/2,ex=sp.x+Math.cos(ang)*(tw/2+off),ey=sp.y+Math.sin(ang)*(tw/2+off);i===0?ctx.moveTo(ex,ey):ctx.lineTo(ex,ey);}ctx.closePath();ctx.stroke();};
    de(-2,'#00eaff55');de(2,'#00eaff55');de(-4,'#00eaff22');
    ctx.strokeStyle='#ffffff22';ctx.lineWidth=2;ctx.setLineDash([20,30]);dp(0,'#ffffff22');ctx.setLineDash([]);
    const sf=this.spline[0],ang=this.getTA(0)+Math.PI/2;
    ctx.strokeStyle='#ffffff';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(sf.x+Math.cos(ang)*tw/2,sf.y+Math.sin(ang)*tw/2);ctx.lineTo(sf.x-Math.cos(ang)*tw/2,sf.y-Math.sin(ang)*tw/2);ctx.stroke();
  }
  drawCar(car,isPlayer=false,isPolice=false){
    ctx.save();ctx.translate(car.x,car.y);ctx.rotate(car.angle+(isPlayer?car.driftAngle:0));
    const w=car.width,h=car.height;
    if(isPlayer&&car.shieldTimer>0){ctx.strokeStyle=`rgba(0,136,255,${.5+Math.sin(Date.now()*.01)*.3})`;ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(0,0,w*.9,h*1.5,0,0,Math.PI*2);ctx.stroke();}
    if(isPlayer&&car.collisionFlash>0){ctx.strokeStyle=`rgba(255,60,0,${car.collisionFlash})`;ctx.lineWidth=4;ctx.beginPath();ctx.roundRect(-w/2-3,-h/2-3,w+6,h+6,7);ctx.stroke();}
    ctx.shadowColor=isPolice?'#0044ff':(isPlayer?'#00eaff':car.color);ctx.shadowBlur=isPlayer?20:10;

    if(isPolice){bg.addColorStop(0,'#2233aa');bg.addColorStop(1,'#001166');}
    else{const dt=isPlayer?Math.max(0,(1-car.health/100)*.5):0;bg.addColorStop(0,dt>0?blendColor(car.color,'#ff2200',dt):car.color);bg.addColorStop(1,shadeColor(car.color,-40));}
    ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,5);ctx.fill();
    if(isPlayer&&car.health<60){ctx.strokeStyle=`rgba(255,50,0,${(1-car.health/60)*.7})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-w/4,-h/3);ctx.lineTo(0,h/4);ctx.lineTo(w/5,-h/5);ctx.stroke();}
    ctx.fillStyle='rgba(150,220,255,.35)';ctx.fillRect(-w/2+8,-h/2+2,w/3,h-4);
    ctx.fillStyle=isPolice?'#aaaaff':'#ffffcc';ctx.shadowColor=isPolice?'#aaaaff':'#ffffcc';ctx.shadowBlur=15;ctx.fillRect(w/2-6,-h/2+2,5,4);ctx.fillRect(w/2-6,h/2-6,5,4);
    ctx.fillStyle='#ff2200';ctx.shadowColor='#ff2200';ctx.fillRect(-w/2+1,-h/2+2,4,4);ctx.fillRect(-w/2+1,h/2-6,4,4);
    if(isPolice){const t=Date.now()*.005;ctx.fillStyle=Math.sin(t)>0?'#ff0022':'#0022ff';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=20;ctx.fillRect(-4,-h/2-5,8,5);}

  }
  drawDmgLabels(){for(const l of this.damageLabels){ctx.save();ctx.globalAlpha=l.alpha;ctx.font='bold 16px Orbitron,monospace';ctx.fillStyle=l.color;ctx.shadowColor=l.color;ctx.shadowBlur=10;ctx.textAlign='center';ctx.fillText(l.text,l.x-this.camX,l.y-this.camY);ctx.restore();}}

  drawPowerups(){
    for(const pu of this.powerups){if(pu.collected)continue;ctx.save();ctx.translate(pu.x,pu.y);const p=Math.sin(pu.pulse)*.15+1;ctx.scale(p,p);
    const cols={nitro:['#ff6a00','#ffcc00'],repair:['#00ff88','#00eaff'],shield:['#0088ff','#aa44ff']};const[c1,c2]=cols[pu.type];
    ctx.shadowColor=c1;ctx.shadowBlur=15;const gr=ctx.createRadialGradient(0,0,0,0,0,14);gr.addColorStop(0,c1+'dd');gr.addColorStop(1,c2+'44');ctx.fillStyle=gr;ctx.strokeStyle=c1;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pu.type==='nitro'?'⚡':pu.type==='repair'?'❤':'🛡',0,0);ctx.restore();}
  }
  drawParticles(){for(const p of this.particles){ctx.save();ctx.globalAlpha=Math.min(1,p.life/p.maxLife);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();ctx.restore();}}
  drawSkids(){
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=4;
    for(let i=1;i<this.skidMarks.length;i++){const a=this.skidMarks[i-1],b=this.skidMarks[i];if(Math.hypot(b.x-a.x,b.y-a.y)<30){ctx.globalAlpha=a.alpha*.3;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
    ctx.globalAlpha=1;if(this.skidMarks.length>500)this.skidMarks=this.skidMarks.slice(-400);
  }
  drawSpeedLines(){
    const spd=this.player.speed;if(spd<4)return;const it=Math.min(1,(spd-4)/3),cx=canvas.width/2,cy=canvas.height/2;
    for(let i=0;i<12;i++){const ang=(i/12)*Math.PI*2+this.player.angle,len=(100+Math.random()*200)*it;ctx.save();ctx.globalAlpha=.1*it;ctx.strokeStyle='#00eaff';ctx.lineWidth=Math.random()*2;ctx.beginPath();ctx.moveTo(cx+Math.cos(ang)*canvas.width*.4,cy+Math.sin(ang)*canvas.height*.4);ctx.lineTo(cx+Math.cos(ang)*(canvas.width*.4+len),cy+Math.sin(ang)*(canvas.height*.4+len));ctx.stroke();ctx.restore();}
  }
  updateHUD(){
    const p=this.player;document.getElementById('lap-value').textContent=`${p.lap}/${this.totalLaps}`;
    let pos=1;const pp=p.lap*this.spline.length+p.trackProgress;for(const r of this.rivals)if((r.lap||1)*this.spline.length+r.trackProgress>pp)pos++;
    document.getElementById('pos-value').textContent=pos+'°';
    const m=Math.floor(this.elapsed/60),s=Math.floor(this.elapsed%60);document.getElementById('time-value').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    document.getElementById('level-value').textContent=this.level;document.getElementById('nitro-bar').style.width=p.nitro+'%';

    document.getElementById('health-bar').style.background=p.health<30?'linear-gradient(90deg,#ff2200,#ff6600)':'linear-gradient(90deg,#00ff88,#00eaff)';
    document.getElementById('speed-value').textContent=Math.round(p.speed*30);
  }
  drawSpeedometer(){
    sctx.clearRect(0,0,160,160);const cx=80,cy=80,r=70,sr=Math.min(1,this.player.speed/this.player.maxSpeed);
    sctx.beginPath();sctx.arc(cx,cy,r,Math.PI*.75,Math.PI*2.25);sctx.strokeStyle='#ffffff11';sctx.lineWidth=12;sctx.stroke();
    sctx.beginPath();sctx.arc(cx,cy,r,Math.PI*.75,Math.PI*.75+sr*Math.PI*1.5);sctx.strokeStyle=sr>.8?'#ff4466':sr>.5?'#ffcc00':'#00eaff';sctx.lineWidth=12;sctx.lineCap='round';sctx.shadowColor=sctx.strokeStyle;sctx.shadowBlur=10;sctx.stroke();sctx.shadowBlur=0;
    for(let i=0;i<=10;i++){const a=Math.PI*.75+(i/10)*Math.PI*1.5;sctx.beginPath();sctx.moveTo(cx+Math.cos(a)*(r-18),cy+Math.sin(a)*(r-18));sctx.lineTo(cx+Math.cos(a)*(r-8),cy+Math.sin(a)*(r-8));sctx.strokeStyle='#ffffff44';sctx.lineWidth=i%5===0?2:1;sctx.stroke();}
    const na=Math.PI*.75+sr*Math.PI*1.5;sctx.beginPath();sctx.moveTo(cx,cy);sctx.lineTo(cx+Math.cos(na)*(r-15),cy+Math.sin(na)*(r-15));sctx.strokeStyle='#ff4466';sctx.lineWidth=2.5;sctx.shadowColor='#ff4466';sctx.shadowBlur=8;sctx.stroke();sctx.shadowBlur=0;
    sctx.beginPath();sctx.arc(cx,cy,5,0,Math.PI*2);sctx.fillStyle='#ff4466';sctx.fill();
  }
  drawMinimap(){
    const mw=140,mh=140,sc=.055,ox=mw/2-this.W*sc/2,oy=mh/2-this.H*sc/2;
    mctx.clearRect(0,0,mw,mh);mctx.fillStyle='rgba(0,0,0,.8)';mctx.fillRect(0,0,mw,mh);
    const dl=(lw,col)=>{mctx.strokeStyle=col;mctx.lineWidth=lw;mctx.beginPath();mctx.moveTo(this.spline[0].x*sc+ox,this.spline[0].y*sc+oy);for(const s of this.spline)mctx.lineTo(s.x*sc+ox,s.y*sc+oy);mctx.closePath();mctx.stroke();};
    dl(4,'#ffffff33');dl(2,'#00eaff44');
    for(const r of this.rivals){mctx.fillStyle=r.color;mctx.beginPath();mctx.arc(r.x*sc+ox,r.y*sc+oy,3,0,Math.PI*2);mctx.fill();}
    for(const c of this.police){mctx.fillStyle=Math.sin(Date.now()*.01)>0?'#ff0022':'#0022ff';mctx.beginPath();mctx.arc(c.x*sc+ox,c.y*sc+oy,4,0,Math.PI*2);mctx.fill();}
    mctx.fillStyle='#00eaff';mctx.shadowColor='#00eaff';mctx.shadowBlur=8;mctx.beginPath();mctx.arc(this.player.x*sc+ox,this.player.y*sc+oy,5,0,Math.PI*2);mctx.fill();mctx.shadowBlur=0;
  }
}

let lastTime=0;
function gameLoop(ts){const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;if(game){game.update(dt);game.draw();}animFrame=requestAnimationFrame(gameLoop);}
function startGame(diff){
  lastDifficulty=diff;
  document.getElementById('start-screen').style.display='none';document.getElementById('result-screen').style.display='none';document.getElementById('ui-overlay').style.display='block';
  document.getElementById('collision-alert').style.opacity='0';document.getElementById('damage-overlay').style.opacity='0';document.getElementById('collision-num').textContent='0';
  if(game){game.destroy();game=null;}if(animFrame)cancelAnimationFrame(animFrame);
  game=new NitroPursuit(diff,1);lastTime=performance.now();animFrame=requestAnimationFrame(gameLoop);
}
function showStartScreen(){if(game){game.destroy();game=null;}document.getElementById('start-screen').style.display='flex';document.getElementById('result-screen').style.display='none';document.getElementById('ui-overlay').style.display='none';}
function showResultScreen(won,g){
  setTimeout(()=>{
    document.getElementById('ui-overlay').style.display='none';const sc=document.getElementById('result-screen');sc.style.display='flex';
    const ti=document.getElementById('result-title'),so=document.getElementById('result-score');
    if(won){ti.textContent='🏆 VICTORIA';ti.style.background='linear-gradient(135deg,#ffcc00,#ff6a00)';ti.style.webkitBackgroundClip='text';const m=Math.floor(g.elapsed/60),s=Math.floor(g.elapsed%60);so.textContent=`TIEMPO: ${m}:${s.toString().padStart(2,'0')} | COLISIONES: ${g.totalCollisions}`;}
    else{ti.textContent='💥 DESTRUIDO';ti.style.background='linear-gradient(135deg,#ff0022,#ff6600)';ti.style.webkitBackgroundClip='text';so.textContent=`VUELTA ${g.player.lap}/${g.totalLaps} | COLISIONES: ${g.totalCollisions}`;}
  },500);
}
</script>
